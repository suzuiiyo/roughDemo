<!DOCTYPE html PUBLIC>
<html>
<head>
	<title>EXERCISE</title>
	<style type="text/css">
	.getIntro{position:relative;width:50%;padding-top:100px;top:0;bottom:0;left:0;right:0;margin:0 35% 0;}
	.blockIntro{float:left;width:25%;height:100px;border-radius:10%;}
	#acolor{background-color: red;}
	#bcolor{background-color: green;}
	#ccolor{background-color: yellow;}
	.getCenter{position:absolute;width:100%;padding-top:100px;margin:0 auto;}
	.blockCenter{float:left;width:25%;height:100px;border-radius:10%;}
	#dcolor{background-color: pink;}
	#ecolor{background-color: black;}
	#fcolor{background-color: violet;}
	.getBottom{position:absolute;width:100%;padding-top:200px;margin:0 auto;}
	.blockBottom{float:left;width:25%;height:100px;border-radius:10%;}
	#gcolor{background-color: orange;}
	#hcolor{background-color: cyan;}
	#icolor{background-color: silver;}
	</style>
</head>
<body>
	<div class="getIntro">
	<div id="aColor" class="blockIntro"></div>
	<div id="bColor" class="blockIntro"></div>
	<div id="ccolor" class="blockIntro"></div>
	<div class="getCenter">
	<div id="dcolor" class="blockCenter"></div>
	<div id="ecolor" class="blockCenter"></div>
	<div id="fcolor" class="blockCenter"></div>
	</div>
	<div class="getBottom">
	<div id="gcolor" class="blockBottom"></div>
	<div id="hcolor" class="blockBottom"></div>
	<div id="icolor" class="blockBottom"></div>
	</div>
	</div>
</body> 
</html>
